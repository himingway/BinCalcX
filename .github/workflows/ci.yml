name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------- linux
  linux:
    name: Linux · build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev cmake ninja-build

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBINCALC_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ------------------------------------------------------------------- windows
  windows:
    name: Windows · build + runnable package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6 (MSVC)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Configure
        run: cmake -S . -B build -DBINCALC_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Collect runtime deps (windeployqt)
        shell: bash
        run: |
          windeployqt --release --no-translations --no-system-d3d-compiler \
            --no-opengl-sw --no-angle "build/Release/BinCalc.exe"

      - name: Upload runnable package
        uses: actions/upload-artifact@v4
        with:
          name: BinCalc-windows-x64
          path: build/Release/
          if-no-files-found: error
