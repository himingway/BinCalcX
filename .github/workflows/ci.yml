name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------- linux
  linux:
    name: Linux · build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev cmake ninja-build

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBINCALC_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ------------------------------------------------------------------- windows
  windows:
    name: Windows · build + runnable package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6 (MSVC)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Configure
        run: cmake -S . -B build -DBINCALC_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Collect runtime deps (windeployqt)
        shell: bash
        run: |
          windeployqt --release --no-translations --no-system-d3d-compiler \
            --no-opengl-sw "build/Release/BinCalc.exe"

      - name: Upload runnable package
        uses: actions/upload-artifact@v4
        with:
          name: BinCalc-windows-x64
          path: build/Release/
          if-no-files-found: error

  # ----------------------------------------------- windows (single static file)
  windows-static:
    name: Windows · single-file static exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (MinGW64 + static Qt6)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-qt6-static
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-upx

      - name: Configure & build (static) + test
        shell: msys2 {0}
        run: |
          # MSYS2 ships qt6-static under its own prefix (/mingw64/qt6-static);
          # use its qt-cmake-static wrapper so the bundled static deps
          # (libpng/freetype/...) resolve. Fall back to plain cmake + that prefix.
          if [ -x /mingw64/qt6-static/bin/qt-cmake-static ]; then
            /mingw64/qt6-static/bin/qt-cmake-static -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release -DBINCALC_BUILD_TESTS=ON
          else
            cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH=/mingw64/qt6-static -DBINCALC_BUILD_TESTS=ON
          fi
          cmake --build build
          ctest --test-dir build --output-on-failure

      - name: Strip + UPX → one small file
        shell: msys2 {0}
        run: |
          strip build/BinCalc.exe
          upx --best --lzma build/BinCalc.exe || true
          ls -lh build/BinCalc.exe

      - name: Upload single-file exe
        uses: actions/upload-artifact@v4
        with:
          name: BinCalc-windows-static
          path: build/BinCalc.exe
          if-no-files-found: error
